services:
  database:
    image: postgres:17-bookworm
    container_name: job-tracker-database
    restart: unless-stopped
    environment:
      POSTGRES_DB: job_tracker_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - job_tracker_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U postgres -d job_tracker_db
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        DATABASE_URL: postgresql://postgres:postgres@database:5432/job_tracker_db?schema=public
    container_name: job-tracker-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@database:5432/job_tracker_db?schema=public
      JWT_SECRET: docker-development-secret-change-in-production
      PORT: 3001
      FRONTEND_URL: http://localhost:3000
    ports:
      - "3001:3001"
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://localhost:3001/api').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001/api
    container_name: job-tracker-frontend
    restart: unless-stopped
    environment:
      PORT: 3000
      HOSTNAME: 0.0.0.0
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  job_tracker_postgres_data: